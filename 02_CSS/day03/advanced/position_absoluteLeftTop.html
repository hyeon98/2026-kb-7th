<!doctype html>
<html>
  <head>
    <title>CSS3 Position Property</title>
    <style>
      .box {
        width: 300px;
        height: 300px;
        position: absolute;
      }

      .box:nth-child(1) {
        background-color: red;
        left: 10px;
        top: 10px;
        z-index: 10;
      }

      .box:nth-child(2) {
        background-color: green;
        left: 50px;
        top: 50px;
        z-index: 50;
      }

      .box:nth-child(3) {
        background-color: blue;
        left: 100px;
        top: 100px;
        z-index: 100;
      }
    </style>
  </head>
  <body>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
  </body>
</html>
