<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      window.onload = function () {
        // 문서객체에서 id가 clock으로 지정된
        let clock = document.getElementById('clock');

        // 1초 마다 시간이 갱신되어 출력되도록 콜백함수(setInterval())사용
        setInterval(() => {
          let now = new Date();
          clock.textContent = now.toString();
        }, 1000);
      };
    </script>
  </head>
  <body>
    <h1 id="clock"></h1>
  </body>
</html>
