<script>
  const now = new Date();
  const month = now.getMonth();

  // 3~5월이 봄, 6~8월이 여름, 9~11월이 가을, 12~2월이 겨울
  if (month >= 3 && month <= 5) {
    alert('봄입니다.');
  } else if (month >= 6 && month <= 8) {
    alert('여름입니다.');
  } else if (month >= 9 && month <= 11) {
    alert('가을입니다.');
  } else {
    alert('겨울입니다.');
  }
</script>
