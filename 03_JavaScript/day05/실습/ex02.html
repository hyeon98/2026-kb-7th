<body>
  <input type="number" id="ageInput" />
  <button onclick="checkAge()">확인</button>
  <button onclick="checkAge2()">확인2</button>
</body>

<script>
  function checkAge() {
    let age = document.getElementById('ageInput').value;

    if (age >= 18) {
      console.log('만원 내셈');
    } else {
      console.log('5천원만 내~');
    }
  }

  let value = 10;
  if (value === 10) {
    console.log('10이 맞습니다.');
  }

  function checkAge2() {
    let age = document.getElementById('ageInput').value;

    if (age >= 65) console.log('무료입니다. 어르신');
    else if (age >= 18 && age <= 65) console.log('만원 내셈');
    else if (age < 18) console.log('5천원만 내~');
  }
</script>
