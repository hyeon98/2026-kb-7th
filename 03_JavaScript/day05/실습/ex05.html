<script>
  // Map 객체 생성
  const map = new Map();

  // Map
  map.set('key1', 'value1');
  map.set('key2', 'value2');

  console.log(map);

  const map1 = new Map([
    ['key3', 'value3'],
    ['key4', 'value4'],
  ]);

  console.log(map1);

  // Map 값 삭제 => delete
  map1.delete('key3');
  console.log(map1);

  // Map의 모든 엔트리셋 삭제
  map1.clear();
  console.log(map1);

  map.forEach((val, key) => {
    console.log(val + ', ' + key);
  });

  for (let key of map.keys()) {
    console.log('key: ' + key);
  }

  for (const value of map.values()) {
    console.log(value);
  }

  for (let [key, value] of map.entries()) {
    console.log(key + ', ' + value);
  }

  console.log(map.get(key1));
  console.log(map.has(key1));
  console.log(map.size);
</script>
